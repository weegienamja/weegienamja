  </g>

  <g class="float">
    <circle cx="770" cy="106" r="7" fill="#8EE7FF" filter="url(#nodeGlow)"/>
    <circle cx="855" cy="74" r="5" fill="#B9A7FF" filter="url(#nodeGlow)"/>
    <circle cx="953" cy="118" r="8" fill="#8EE7FF" filter="url(#nodeGlow)"/>
    <circle cx="1016" cy="190" r="5" fill="#7DFFB2" filter="url(#nodeGlow)"/>
    <circle cx="1094" cy="260" r="7" fill="#B9A7FF" filter="url(#nodeGlow)"/>
    <circle cx="905" cy="183" r="7" fill="#7DFFB2" filter="url(#nodeGlow)"/>
    <circle cx="1063" cy="164" r="6" fill="#8EE7FF" filter="url(#nodeGlow)"/>
    <circle cx="942" cy="264" r="8" fill="#B9A7FF" filter="url(#nodeGlow)"/>
    <circle cx="805" cy="283" r="5" fill="#7DFFB2" filter="url(#nodeGlow)"/>
  </g>

  <g transform="translate(150 96)">
    <rect x="0" y="0" width="520" height="170" rx="18" fill="#05070B" fill-opacity="0.85" stroke="#263244"/>
    <circle cx="26" cy="25" r="6" fill="#FF5F56"/>
    <circle cx="47" cy="25" r="6" fill="#FFBD2E"/>
    <circle cx="68" cy="25" r="6" fill="#27C93F"/>

    <text x="24" y="66" class="mono blue" font-size="17">$ whoami</text>
    <text x="24" y="96" class="mono bright" font-size="19">Jamie Blair</text>
    <text x="24" y="126" class="mono muted" font-size="15">networking · automation · ai tooling</text>
    <text x="24" y="154" class="mono green" font-size="15">building self-serve systems from messy work</text>
  </g>

  <g transform="translate(150 282)">
    <rect x="0" y="-28" width="116" height="28" rx="14" fill="#111827" stroke="#1BA0D7" stroke-opacity="0.7"/>
    <text x="18" y="-9" class="mono blue" font-size="12">Python</text>

    <rect x="128" y="-28" width="138" height="28" rx="14" fill="#111827" stroke="#3178C6" stroke-opacity="0.7"/>
    <text x="146" y="-9" class="mono blue" font-size="12">TypeScript</text>

    <rect x="278" y="-28" width="98" height="28" rx="14" fill="#111827" stroke="#7C5CFF" stroke-opacity="0.7"/>
    <text x="298" y="-9" class="mono violet" font-size="12">MCP</text>

    <rect x="388" y="-28" width="130" height="28" rx="14" fill="#111827" stroke="#22C55E" stroke-opacity="0.7"/>
    <text x="407" y="-9" class="mono green" font-size="12">Next.js</text>
  </g>

  <g transform="translate(742 92)">
    <rect x="0" y="0" width="302" height="168" rx="18" fill="#090C13" fill-opacity="0.76" stroke="#263244"/>
    <text x="22" y="38" class="mono muted" font-size="13">current systems</text>

    <g transform="translate(22 62)">
      <rect x="0" y="0" width="258" height="24" rx="8" fill="#111827"/>
      <text x="12" y="17" class="mono bright" font-size="12">WindForge</text>
      <text x="178" y="17" class="mono green" font-size="12">678+ tests</text>
    </g>

    <g transform="translate(22 94)">
      <rect x="0" y="0" width="258" height="24" rx="8" fill="#111827"/>
      <text x="12" y="17" class="mono bright" font-size="12">PitchEdge</text>
      <text x="177" y="17" class="mono violet" font-size="12">football AI</text>
    </g>

    <g transform="translate(22 126)">
      <rect x="0" y="0" width="258" height="24" rx="8" fill="#111827"/>
      <text x="12" y="17" class="mono bright" font-size="12">vManage MCP</text>
      <text x="183" y="17" class="mono blue" font-size="12">20 tools</text>
    </g>
  </g>

  <g class="pulse" opacity="0.9">
    <text x="150" y="78" class="mono muted" font-size="13">~/profile/readme.svg</text>
    <text x="735" y="292" class="mono muted" font-size="13">Glasgow now · Phnom Penh eventually · meetings reluctantly</text>
  </g>
</svg>
'''

path = Path("/mnt/data/jamie-github-profile-banner.svg")
path.write_text(svg, encoding="utf-8")
print(f"Created: {path}")
print(f"Size: {path.stat().st_size:,} bytes")
