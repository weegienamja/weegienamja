from pathlib import Path

svg = r'''<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jamie Blair GitHub Profile Banner</title>
  <desc id="desc">Dark technical profile banner for Jamie Blair showing AI tooling, networking, automation, and side-project systems.</desc>

  <defs>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1BA0D7" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#1BA0D7" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#1BA0D7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.48"/>
      <stop offset="55%" stop-color="#7C5CFF" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cardStroke" x1="140" y1="54" x2="1080" y2="306" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1BA0D7" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#7C5CFF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.65"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="169" y1="126" x2="619" y2="126" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDEDED"/>
      <stop offset="0.55" stop-color="#DDEBFF"/>
      <stop offset="1" stop-color="#8EE7FF"/>
    </linearGradient>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>

    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <filter id="nodeGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #9CA3AF; }
      .bright { fill: #EDEDED; }
      .blue { fill: #8EE7FF; }
      .green { fill: #7DFFB2; }
      .violet { fill: #B9A7FF; }

      @media (prefers-reduced-motion: no-preference) {
        .pulse {
          animation: pulse 4.5s ease-in-out infinite;
        }
        .float {
          animation: float 6s ease-in-out infinite;
        }
        .dash {
          stroke-dasharray: 7 10;
          animation: dash 14s linear infinite;
        }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      @keyframes dash {
        to { stroke-dashoffset: -160; }
      }
    </style>
  </defs>

  <rect width="1200" height="360" fill="#050508"/>
  <rect width="1200" height="360" fill="url(#grid)"/>

  <circle cx="220" cy="70" r="210" fill="url(#glowBlue)"/>
  <circle cx="980" cy="300" r="260" fill="url(#glowViolet)"/>
  <circle cx="740" cy="-30" r="190" fill="url(#glowViolet)" opacity="0.55"/>

  <g filter="url(#softShadow)">
